version: '3.8'

services:
  backend:
    build:
      context: ./BE-Models
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./BE-Models/src:/app/src
      - ./BE-Models/outputs:/app/outputs
      - ./BE-Models/scripts:/app/scripts
      - ./BE-Models/configs:/app/configs
    environment:
      - PYTHONUNBUFFERED=1
      - DEBACK_ROOT=/app
      - PROJECT_ROOT=/app
      - RESULTS_DIR=/app/outputs/results
      - DATASET_DIR=/app/outputs/dataset
      - MODELS_DIR=/app/outputs/models
    restart: unless-stopped

  frontend:
    build:
      context: ./FE
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped